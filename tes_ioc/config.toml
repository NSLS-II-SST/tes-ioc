[dastard]
default_source = "abaco"
available_sources = ["abaco", "simulation"]
host = "localhost"
port = 5500

[dastard.pulseTrigger]
EdgeMulti = true
EdgeMultiLevel = 10
EdgeMultiVerifyNMonotone = 5

[dastard.noiseTrigger]
AutoTrigger = true
AutoDelay = 0

[dastard.pulseLengths]
Nsamp = 2048
Npre = 512

[dastard.writeControl]
WriteLJH22 = true
WriteOFF = false
Path = "/data"

[dastard.abaco]
HostPortUDP = ["10.0.15.100:4000"]
Unwrap = true
ResetAfter = 2000
PulseSign = 1
Bias = true
RescaleRaw = true
InvertChan = []

[dastard.simulation]
Nchan = 4
SampleRate = 2000
Pedestal = 200
Amplitudes = [2000, 4000]
Nsamp = 1024

[tes]
base_user_output_dir = "~/userout"
server_log_dir = "~/.scan_server"
projector_filename = "~/.dastard/projectors.hdf5"
projector_cmd = ["make_projectors", "-ro"]
programs_to_check = ["dcom", "dastard", "cringe"]
adr = false
cringe = false
beamtime_id = 1
rsync_on_file_end = false
rsync_on_scan_end = false

[epics]
prefix="SIM_TES:"